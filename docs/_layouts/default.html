<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a href="{{ '/' | relative_url }}" class="brand">{{ site.title }}</a>
        <nav class="topbar-nav" aria-label="Primary">
          <a class="nav-link" href="{{ site.public_source.url }}">GitHub</a>
          <a class="nav-link" href="{{ '/changelog/' | relative_url }}">Changelog</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>Maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a> &middot; <a href="{{ site.public_source.url }}">{{ site.public_source.nwo }}</a></p>
      <p class="theme-credit">Hosted on GitHub Pages</p>
    </footer>

    <div class="sticky-cta" aria-hidden="false">
      <a class="btn-strava" href="https://api.andvos.xyz/auth/strava/start">Connect with Strava</a>
    </div>
  </body>
</html>
