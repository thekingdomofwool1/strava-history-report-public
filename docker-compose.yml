services:
  backend:
    image: ghcr.io/thekingdomofwoolorg/strava-history-backend:latest
    pull_policy: always
    ports:
      - '4000:4000'
    secrets:
      - source: backend_env
        target: /app/.env
    volumes:
      - backend_db:/app/prisma

volumes:
  backend_db:

secrets:
  backend_env:
    file: ./backend.env
