
name: Build and Push Containers

on:
    push:
      branches: [master]
    workflow_dispatch:

jobs:
    build-and-push:
      runs-on: ubuntu-latest
      env:
        REGISTRY: ghcr.io
        IMAGE_NAMESPACE: thekingdomofwoolorg          # change to your namespace
        GHCR_USERNAME: thekingdomofwool1                   # replace for local testing; later use secrets
        GHCR_TOKEN: "REDACTED"
        BACKEND_IMAGE_NAME: strava-history-backend
        FRONTEND_IMAGE_NAME: strava-history-frontend

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Log in to GHCR
          run: echo "${GHCR_TOKEN}" | docker login "${REGISTRY}" -u "${GHCR_USERNAME}" --password-stdin

        - name: Build backend image
          run: |
            docker build -t ${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA} backend
            docker tag ${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA} \
                       ${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:latest
        - name: Build frontend image
          run: |
            docker build -t ${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA} frontend
            docker tag ${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA} \
                       ${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:latest
        - name: Push backend image
          run: |
            docker push ${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}
            docker push ${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:latest
        - name: Push frontend image
          run: |
            docker push ${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}
            docker push ${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:latest
